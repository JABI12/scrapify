<div class="contact-container card">
    <h2>Contact Us</h2>
    <p>We'd love to hear from you! Please fill out the form below, and we'll get back to you as soon as possible.</p>

    <form (ngSubmit)="onSubmit(contactForm)" #contactForm="ngForm" class="contact-form">
        <!-- Name -->
        <div class="form-group">
            <label for="name">Name</label>
            <input 
                type="text" 
                id="name" 
                name="name"
                placeholder="Your Name" 
                [(ngModel)]="contactData.name" 
                #nameModel="ngModel"
                required
            >
            <div *ngIf="nameModel.invalid && nameModel.touched">
                <small class="error">Your name is required.</small>
            </div>
        </div>

        <!-- Email -->
        <div class="form-group">
            <label for="email">Email</label>
            <input 
                type="email" 
                id="email" 
                name="email"
                placeholder="Your Email" 
                [(ngModel)]="contactData.email" 
                #emailModel="ngModel"
                required 
                email
            >
            <div *ngIf="emailModel.invalid && emailModel.touched">
                <small class="error">Please enter a valid email address.</small>
            </div>
        </div>

        <!-- Subject -->
        <div class="form-group">
            <label for="subject">Subject</label>
            <input 
                type="text" 
                id="subject" 
                name="subject"
                placeholder="Subject" 
                [(ngModel)]="contactData.subject" 
                #subjectModel="ngModel"
                required
            >
            <div *ngIf="subjectModel.invalid && subjectModel.touched">
                <small class="error">Subject is required.</small>
            </div>
        </div>

        <!-- Message -->
        <div class="form-group">
            <label for="message">Message</label>
            <textarea 
                id="message" 
                name="message"
                rows="5" 
                placeholder="Your Message" 
                [(ngModel)]="contactData.message" 
                #messageModel="ngModel"
                required
            ></textarea>
            <div *ngIf="messageModel.invalid && messageModel.touched">
                <small class="error">Message text is required.</small>
            </div>
        </div>

        <button type="submit" class="btn btn-primary submit-button" [disabled]="contactForm.invalid">Send Message</button>
    </form>
</div>
